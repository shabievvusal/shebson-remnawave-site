services:
  db:
    image: postgres:16-alpine
    container_name: nexus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-nexus}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-shebson_vpn}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexus} -d ${DB_NAME:-shebson_vpn}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexus

  api:
    build:
      context: ./ShebsonVPN.API
      dockerfile: Dockerfile
    container_name: nexus_api
    restart: unless-stopped
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${DB_NAME:-shebson_vpn};Username=${DB_USER:-nexus};Password=${DB_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: shebson-vpn
      Jwt__Audience: shebson-vpn-users
      Remnawave__Url: ${REMNAWAVE_URL}
      Remnawave__Token: ${REMNAWAVE_TOKEN}
      Remnawave__Inbound: ${REMNAWAVE_INBOUND}
      Remnawave__Cookie: ${REMNAWAVE_COOKIE}
      Email__SmtpHost: ${EMAIL_SMTP_HOST}
      Email__SmtpPort: ${EMAIL_SMTP_PORT}
      Email__SmtpUser: ${EMAIL_SMTP_USER}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD}
      Email__FromAddress: ${EMAIL_FROM}
      Email__FromName: ${EMAIL_FROM_NAME}
      AppBaseUrl: https://my.shebsonremna.spb.ru
      Yookassa__ShopId: ${YOOKASSA_SHOP_ID}
      Yookassa__SecretKey: ${YOOKASSA_SECRET_KEY}
      Yookassa__ReturnUrl: https://my.shebsonremna.spb.ru/dashboard
      AllowedOrigin: https://my.shebsonremna.spb.ru
      ASPNETCORE_URLS: http://+:5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nexus

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./${NGINX_CONF:-nginx-http-only.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - nexus

  certbot:
    image: certbot/certbot
    container_name: nexus_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "certbot certonly --webroot -w /var/www/certbot
      --email shrekson8@gmail.com -d my.shebsonremna.spb.ru
      --agree-tos --non-interactive --force-renewal"

volumes:
  db_data:

networks:
  nexus:
    driver: bridge
